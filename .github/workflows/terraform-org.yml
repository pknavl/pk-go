name: Terraform Org

on:
  workflow_call:
    inputs:
      action:
        description: Action to run
        required: false
        type: string
        default: apply
      aws_region:
        description: AWS region
        required: false
        type: string
      project_slug:
        description: Project slug
        required: false
        type: string
      domain:
        description: Root domain
        required: false
        type: string
      zone_id:
        description: Route53 hosted zone ID
        required: false
        type: string
      org_deploy_role_arn:
        description: Org deploy role ARN
        required: false
        type: string
      dev_deploy_role_arn:
        description: Dev deploy role ARN
        required: false
        type: string
      prod_deploy_role_arn:
        description: Prod deploy role ARN
        required: false
        type: string
      aws_signin_start_url:
        description: IAM Identity Center start URL
        required: false
        type: string
    secrets:
      AWS_REGION:
        required: false
      PROJECT_SLUG:
        required: false
      DOMAIN:
        required: false
      ROUTE53_ZONE_ID:
        required: false
      ORG_DEPLOY_ROLE_ARN:
        required: false
      DEV_DEPLOY_ROLE_ARN:
        required: false
      PROD_DEPLOY_ROLE_ARN:
        required: false
      AWS_SIGNIN_START_URL:
        required: false
  workflow_dispatch:
    inputs:
      action:
        description: Action to run
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

jobs:
  terraform-org:
    name: Terraform Org
    runs-on: ubuntu-latest
    environment: org
    env:
      AWS_REGION: ${{ inputs.aws_region != '' && inputs.aws_region || vars.AWS_REGION != '' && vars.AWS_REGION || secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-2' }}
      PROJECT_SLUG: ${{ inputs.project_slug != '' && inputs.project_slug || vars.PROJECT_SLUG != '' && vars.PROJECT_SLUG || secrets.PROJECT_SLUG != '' && secrets.PROJECT_SLUG || '' }}
      DOMAIN: ${{ inputs.domain != '' && inputs.domain || vars.DOMAIN != '' && vars.DOMAIN || secrets.DOMAIN != '' && secrets.DOMAIN || '' }}
      ZONE_ID: ${{ inputs.zone_id != '' && inputs.zone_id || vars.ROUTE53_ZONE_ID != '' && vars.ROUTE53_ZONE_ID || secrets.ROUTE53_ZONE_ID != '' && secrets.ROUTE53_ZONE_ID || '' }}
      AWS_SIGNIN_START_URL: ${{ inputs.aws_signin_start_url != '' && inputs.aws_signin_start_url || vars.AWS_SIGNIN_START_URL != '' && vars.AWS_SIGNIN_START_URL || secrets.AWS_SIGNIN_START_URL != '' && secrets.AWS_SIGNIN_START_URL || '' }}
      ORG_DEPLOY_ROLE_ARN: ${{ inputs.org_deploy_role_arn != '' && inputs.org_deploy_role_arn || vars.ORG_DEPLOY_ROLE_ARN != '' && vars.ORG_DEPLOY_ROLE_ARN || secrets.ORG_DEPLOY_ROLE_ARN != '' && secrets.ORG_DEPLOY_ROLE_ARN || '' }}
      DEV_DEPLOY_ROLE_ARN: ${{ inputs.dev_deploy_role_arn != '' && inputs.dev_deploy_role_arn || vars.DEV_DEPLOY_ROLE_ARN != '' && vars.DEV_DEPLOY_ROLE_ARN || secrets.DEV_DEPLOY_ROLE_ARN != '' && secrets.DEV_DEPLOY_ROLE_ARN || '' }}
      PROD_DEPLOY_ROLE_ARN: ${{ inputs.prod_deploy_role_arn != '' && inputs.prod_deploy_role_arn || vars.PROD_DEPLOY_ROLE_ARN != '' && vars.PROD_DEPLOY_ROLE_ARN || secrets.PROD_DEPLOY_ROLE_ARN != '' && secrets.PROD_DEPLOY_ROLE_ARN || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate workflow configuration
        run: |
          missing=()
          for name in PROJECT_SLUG DOMAIN ZONE_ID ORG_DEPLOY_ROLE_ARN DEV_DEPLOY_ROLE_ARN PROD_DEPLOY_ROLE_ARN; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if ((${#missing[@]} > 0)); then
            printf 'Missing required GitHub Actions configuration: %s\n' "${missing[*]}" >&2
            echo "Set these as GitHub Actions Variables or Secrets before rerunning this workflow." >&2
            exit 1
          fi

      - name: Configure AWS credentials (org)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ORG_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        run: |
          terraform -chdir=infra/terraform/org init \
            -backend-config="bucket=${PROJECT_SLUG}-org-tf-state" \
            -backend-config="key=terraform/org.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${PROJECT_SLUG}-org-tf-locks" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform -chdir=infra/terraform/org validate

      - name: Terraform plan
        if: inputs.action == 'plan'
        run: |
          TF_ARGS=(
            -var "project_name=${PROJECT_SLUG}"
            -var "region=${AWS_REGION}"
            -var "domain=${DOMAIN}"
            -var "zone_id=${ZONE_ID}"
             -var "trusted_role_arns=[\"${DEV_DEPLOY_ROLE_ARN}\",\"${PROD_DEPLOY_ROLE_ARN}\"]"
             -var "aws_signin_redirect_enabled=$([[ -n \"${AWS_SIGNIN_START_URL}\" ]] && echo true || echo false)"
             -var "aws_signin_start_url=${AWS_SIGNIN_START_URL}"
             -var "aws_signin_redirect_subdomain=aws.${DOMAIN}"
             )

          terraform -chdir=infra/terraform/org plan "${TF_ARGS[@]}"

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: |
          TF_ARGS=(
            -var "project_name=${PROJECT_SLUG}"
            -var "region=${AWS_REGION}"
            -var "domain=${DOMAIN}"
            -var "zone_id=${ZONE_ID}"
             -var "trusted_role_arns=[\"${DEV_DEPLOY_ROLE_ARN}\",\"${PROD_DEPLOY_ROLE_ARN}\"]"
             -var "aws_signin_redirect_enabled=$([[ -n \"${AWS_SIGNIN_START_URL}\" ]] && echo true || echo false)"
             -var "aws_signin_start_url=${AWS_SIGNIN_START_URL}"
             -var "aws_signin_redirect_subdomain=aws.${DOMAIN}"
             )

          terraform -chdir=infra/terraform/org apply -auto-approve "${TF_ARGS[@]}"
