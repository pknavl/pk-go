<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serverless App Template</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: linear-gradient(120deg, #f3ecde, #e7f0f8);
        color: #1a2430;
      }

      .card {
        background: #ffffffd8;
        border: 1px solid #dbe5ef;
        border-radius: 14px;
        padding: 1.4rem 1.6rem;
        max-width: 560px;
      }

      h1 {
        margin-top: 0;
      }

      a {
        color: #1f6a8f;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Serverless App Template</h1>
      <p>This is the apex marketing placeholder page.</p>
      <p>
        If app deployment is configured, open
        <a href="https://app-dev.example.org">app-dev.example.org</a>
        or your configured app domain.
      </p>
    </div>
  </body>
</html>
